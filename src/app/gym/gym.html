<form class="input-training">
  <mat-form-field>
    <mat-label>Exercise</mat-label>
    <mat-select>
        @for (exercise of exercises; track exercise) {
            <mat-option [value]="exercise.id">
            {{exercise.name}}
            @if (exercise.is_custom) {
              <span style="color: #999;"> (custom)</span>
            }
            </mat-option>
        }
    </mat-select>
  </mat-form-field>
  <mat-form-field>
    <mat-label>Set Number</mat-label>
    <input matInput type="number" placeholder="Ex. 10">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Reps</mat-label>
    <input matInput type="number" placeholder="Ex. 10">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Weight</mat-label>
    <input matInput type="number" placeholder="(Digit it in kg)">
  </mat-form-field>

  <mat-form-field>
    <mat-label>Leave a comment</mat-label>
    <textarea matInput placeholder="Ex. It makes me feel..."></textarea>
  </mat-form-field>
</form>
