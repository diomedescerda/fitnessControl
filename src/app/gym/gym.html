<div class="dashboard-container">
  <div class="input-section">
    <div class="input-block">
      <form class="input-training">
        <mat-form-field>
          <mat-label>Choose a date</mat-label>
          <input matInput [matDatepicker]="picker">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Exercise</mat-label>
          <mat-select>
            @for (exercise of exercises; track exercise) {
            <mat-option [value]="exercise.id">
              {{exercise.name}}
              @if (exercise.isCustom) {
              <span style="color: #999;"> (custom)</span>
              }
            </mat-option>
            }
          </mat-select>
        </mat-form-field>
        <mat-form-field>
          <mat-label>Set Number</mat-label>
          <input matInput type="number" placeholder="Ex. 10">
        </mat-form-field>
        <mat-form-field>
          <mat-label>Reps</mat-label>
          <input matInput type="number" placeholder="Ex. 10">
        </mat-form-field>
        <mat-form-field>
          <mat-label>Weight</mat-label>
          <input matInput type="number" placeholder="(Digit it in kg)">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Leave a comment</mat-label>
          <textarea matInput placeholder="Ex. It makes me feel..."></textarea>
        </mat-form-field>
      </form>
    </div>
  </div>
  <div class="graph-section">
    <p>hola jeje </p>
  </div>
</div>
<!-- Quick Actions -->
<div class="quick-actions">
  <button mat-raised-button color="primary" routerLink="/">
    <mat-icon>dashboard</mat-icon>
    <span>Dashboard</span>
  </button>
  <button mat-raised-button color="primary" routerLink="/running">
    <mat-icon>directions_run</mat-icon>
    <span>Log Run</span>
  </button>
</div>
